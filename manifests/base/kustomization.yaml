apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Default namespace to apply to all resources.
# Change this to deploy the proxy and its resources to any custom namespace.
namespace: kagent

# Manifests to customize
resources:
  - deployment.yaml

# Easily override the container image registry, name, tag, or digest.
images:
  - name: ghcr.io/gke-demos/mcp-auth-proxy
    newName: ghcr.io/gke-demos/mcp-auth-proxy
    newTag: latest
    # To use a digest instead of a tag, uncomment the following line and comment/remove newTag:
    # digest: sha256:1234567890abcdef1234567890abcdef1234567890abcdef1234567890abcdef
