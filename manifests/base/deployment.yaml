apiVersion: v1
kind: ServiceAccount
metadata:
  name: google-mcp-auth-proxy
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: google-mcp-auth-proxy
spec:
  replicas: 2
  selector:
    matchLabels:
      app: google-mcp-auth-proxy
  template:
    metadata:
      labels:
        app: google-mcp-auth-proxy
    spec:
      serviceAccountName: google-mcp-auth-proxy
      containers:
      - name: proxy
        # Replace <org> with your container registry or org name
        image: ghcr.io/gke-demos/mcp-auth-proxy:latest
        env:
        - name: UPSTREAM_URL
          # The target Google MCP server endpoint. Defaults to the GKE MCP server.
          # To use Vertex AI Models, set to: https://us-central1-aiplatform.googleapis.com/...
          value: https://container.googleapis.com
        - name: OAUTH_SCOPES
          # Optional: Comma-separated list of Google OAuth scopes. Defaults to https://www.googleapis.com/auth/cloud-platform.
          # Required for GKE MCP: https://www.googleapis.com/auth/container
          value: "https://www.googleapis.com/auth/container"
        - name: LISTEN_ADDR
          value: ":8080"
        ports:
        - containerPort: 8080
          name: http
        readinessProbe:
          httpGet:
            path: /healthz
            port: 8080
          initialDelaySeconds: 3
          periodSeconds: 5
        resources:
          limits:
            cpu: 200m
            memory: 256Mi
          requests:
            cpu: 50m
            memory: 64Mi
---
apiVersion: v1
kind: Service
metadata:
  name: google-mcp-auth-proxy
spec:
  selector:
    app: google-mcp-auth-proxy
  ports:
  - port: 8080
    targetPort: 8080
    name: http
